<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Taco Cloud</title>
    <link rel="stylesheet" th:href="@{/styles.css}" href="..\static\styles.css">
</head>

<body>


<h1>Order Your Taco Creations!</h1>
<img src="..\static\images\TacoCloud.png"
     th:src="@{/images/TacoCloud.png}"/>

<a th:href="@{/design}" href="#" id="another">Design another taco</a><br/>


<form method="post" th:action="@{/orders}" th:object="${order}" id="orderForm">

    <h3>Your tacos in this order:</h3>
    <ul>
        <li th:each="taco : ${order.tacos}">
            <span th:text="${taco.name}">TACO NAME</span>
        </li>
    </ul>

    <!-- errors -->
    <div th:if="${#fields.hasErrors()}">
        <span class="validationError">Please correct the problems below and resubmit.</span>
    </div>
    <!-- errors -->


    <h3>Deliver my taco masterpieces to...</h3>
    <label for="deliveryName">Name: </label>
    <input type="text" th:field="*{deliveryName}" id="deliveryName"/>

    <!-- tag::allButValidation[] -->
    <span class="validationError"
          th:if="${#fields.hasErrors('deliveryName')}"
          th:errors="*{deliveryName}">Error</span>
    <!-- end::allButValidation[] -->
    <br/>

    <label for="deliveryStreet">Street address: </label>
    <input type="text" th:field="*{deliveryStreet}" id="deliveryStreet"/>

    <!-- tag::allButValidation[] -->
    <span class="validationError"
          th:if="${#fields.hasErrors('deliveryStreet')}"
          th:errors="*{deliveryStreet}">Error</span>
    <!-- end::allButValidation[] -->
    <br/>

    <label for="deliveryCity">City: </label>
    <input type="text" th:field="*{deliveryCity}" id="deliveryCity"/>

    <!-- tag::allButValidation[] -->
    <span class="validationError"
          th:if="${#fields.hasErrors('deliveryCity')}"
          th:errors="*{deliveryCity}">Error</span>
    <!-- end::allButValidation[] -->
    <br/>

    <label for="deliveryState">State: </label>
    <input type="text" th:field="*{deliveryState}" id="deliveryState"/>

    <!-- tag::allButValidation[] -->
    <span class="validationError"
          th:if="${#fields.hasErrors('deliveryState')}"
          th:errors="*{deliveryState}">Error</span>
    <!-- end::allButValidation[] -->
    <br/>

    <label for="deliveryZip">Zip code: </label>
    <input type="text" th:field="*{deliveryZip}" id="deliveryZip"/>

    <!-- tag::allButValidation[] -->
    <span class="validationError"
          th:if="${#fields.hasErrors('deliveryZip')}"
          th:errors="*{deliveryZip}">Error</span>
    <!-- end::allButValidation[] -->
    <br/>

    <h3>Here's how I'll pay...</h3>
    <label for="ccNumber">Credit Card #: </label>
    <input type="text" th:field="*{ccNumber}" id="ccNumber"/>

    <!-- tag::allButValidation[] -->
    <span class="validationError"
          th:if="${#fields.hasErrors('ccNumber')}"
          th:errors="*{ccNumber}">Error</span>
    <!-- end::allButValidation[] -->
    <br/>

    <label for="ccExpiration">Expiration: </label>
    <input type="text" th:field="*{ccExpiration}" id="ccExpiration"/>

    <!-- tag::allButValidation[] -->
    <span class="validationError"
          th:if="${#fields.hasErrors('ccExpiration')}"
          th:errors="*{ccExpiration}">Error</span>
    <!-- end::allButValidation[] -->
    <br/>

    <label for="ccCVV">CVV: </label>
    <input type="text" th:field="*{ccCVV}" id="ccCVV"/>

    <!-- tag::allButValidation[] -->
    <span class="validationError"
          th:if="${#fields.hasErrors('ccCVV')}"
          th:errors="*{ccCVV}">Error</span>
    <!-- end::allButValidation[] -->
    <br/>

    <input type="submit" value="Submit order">

</form>
</body>
</html>
